name: publish

# Publishes ssh-server-manager to PyPI via Trusted Publishing (OIDC) — no
# long-lived token stored in the repo. One-time setup on pypi.org:
#   Account → Publishing → Add a pending publisher
#   project: ssh-server-manager, owner: xiayh0107, repo: servers-connect,
#   workflow: publish.yml, environment: pypi
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install build
      - run: python -m build --outdir dist ./ssh-server-manager
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ssh-server-manager
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # A manual re-run may race an already-uploaded version; treat
          # duplicate files as success so verification runs stay green.
          skip-existing: true
